services:
  # ─── Backend (Spring Boot JAR) ───────────────────────────────────────────────
  - type: web
    name: mydigitalaura-backend
    runtime: java
    plan: free
    buildCommand: cd backend && mvn clean package -DskipTests
    startCommand: java -jar backend/target/portfolio-backend-1.0.0.jar
    envVars:
      - key: PORT
        value: 8080
      - key: DB_URL
        sync: false          # fill in Render dashboard
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random string
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false          # set to your frontend URL after it's deployed

  # ─── Frontend (React + Vite → static) ────────────────────────────────────────
  - type: web
    name: mydigitalaura-frontend
    runtime: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false          # e.g. https://mydigitalaura-backend.onrender.com/api
      - key: VITE_FILE_BASE_URL
        sync: false          # same value as VITE_API_BASE_URL (without /api)
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
